<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thuê Mail · ID 29</title>
<style>
  :root{
    --bg:#0e1014;
    --panel:#161922;
    --panel-2:#1d212c;
    --line:#2a2f3b;
    --text:#e9ecf1;
    --muted:#8b93a3;
    --accent:#5eead4;
    --accent-dim:#163832;
    --danger:#ff6b6b;
    --warn:#f5a623;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'JetBrains Mono','SF Mono',ui-monospace,Menlo,Consolas,monospace;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }

  /* ---------- LOCK SCREEN ---------- */
  #lockScreen{
    width:100%;
    max-width:360px;
    text-align:center;
  }
  #lockScreen .tag{
    color:var(--accent);
    font-size:12px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    margin-bottom:8px;
  }
  #lockScreen h1{
    font-size:20px;
    margin:0 0 28px;
    font-weight:600;
    color:var(--text);
  }
  #pwInput{
    width:100%;
    padding:14px 16px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:8px;
    color:var(--text);
    font-size:16px;
    font-family:inherit;
    text-align:center;
    letter-spacing:0.1em;
    outline:none;
  }
  #pwInput:focus{border-color:var(--accent);}
  #unlockBtn{
    width:100%;
    margin-top:12px;
    padding:14px;
    background:var(--accent);
    color:#0a1a17;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:inherit;
  }
  #unlockBtn:hover{background:#7af0de;}
  #lockError{
    color:var(--danger);
    font-size:13px;
    margin-top:12px;
    min-height:18px;
  }

  /* ---------- MAIN APP ---------- */
  #app{
    display:none;
    width:100%;
    max-width:440px;
  }
  .eyebrow{
    color:var(--accent);
    font-size:11px;
    letter-spacing:0.18em;
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .title{
    font-size:22px;
    font-weight:700;
    margin:0 0 4px;
  }
  .subtitle{
    color:var(--muted);
    font-size:13px;
    margin-bottom:24px;
  }

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:12px;
    padding:22px;
    margin-bottom:16px;
  }

  .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
  }
  .row .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:0.08em;}
  .row .value{font-size:14px;color:var(--text);}
  .row .value.balance{color:var(--accent);font-weight:700;font-size:16px;}

  .qty-block{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:20px;
  }
  .qty-label{font-size:13px;color:var(--muted);}
  .qty-control{
    display:flex;
    align-items:center;
    gap:0;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
  }
  .qty-control button{
    width:36px;height:36px;
    background:var(--panel-2);
    border:none;
    color:var(--text);
    font-size:16px;
    cursor:pointer;
  }
  .qty-control button:hover{background:var(--line);}
  .qty-control input{
    width:48px;
    height:36px;
    text-align:center;
    border:none;
    border-left:1px solid var(--line);
    border-right:1px solid var(--line);
    background:var(--bg);
    color:var(--text);
    font-family:inherit;
    font-size:14px;
  }

  #buyBtn{
    width:100%;
    padding:16px;
    background:var(--accent);
    color:#0a1a17;
    border:none;
    border-radius:8px;
    font-size:14px;
    font-weight:700;
    letter-spacing:0.05em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:inherit;
  }
  #buyBtn:hover{background:#7af0de;}
  #buyBtn:disabled{background:#3a4250;color:var(--muted);cursor:not-allowed;}

  #statusMsg{
    margin-top:14px;
    font-size:13px;
    text-align:center;
    min-height:18px;
  }
  #statusMsg.err{color:var(--danger);}
  #statusMsg.ok{color:var(--accent);}

  /* result list */
  #resultCard{display:none;}
  #resultCard .order-code{
    color:var(--muted);
    font-size:12px;
    margin-bottom:12px;
  }
  .key-item{
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:8px;
    padding:12px 14px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
  }
  .key-item .key-text{
    font-size:13px;
    word-break:break-all;
    color:var(--text);
  }
  .key-item button{
    flex-shrink:0;
    background:transparent;
    border:1px solid var(--line);
    color:var(--accent);
    border-radius:6px;
    padding:6px 10px;
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:0.05em;
    cursor:pointer;
    font-family:inherit;
  }
  .key-item button:hover{border-color:var(--accent);background:var(--accent-dim);}
  .key-item button.copied{color:#0a1a17;background:var(--accent);border-color:var(--accent);}

  .copy-all{
    width:100%;
    margin-top:10px;
    padding:12px;
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    letter-spacing:0.04em;
    text-transform:uppercase;
    cursor:pointer;
    font-family:inherit;
  }
  .copy-all:hover{background:var(--accent-dim);}
  .copy-all.copied{background:var(--accent);color:#0a1a17;}

  .footer-note{
    text-align:center;
    color:var(--muted);
    font-size:11px;
    margin-top:20px;
    line-height:1.6;
  }

  .spinner{
    display:inline-block;
    width:14px;height:14px;
    border:2px solid rgba(10,26,23,0.3);
    border-top-color:#0a1a17;
    border-radius:50%;
    animation:spin 0.7s linear infinite;
    vertical-align:middle;
    margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lockScreen">
  <div class="tag">Nội bộ</div>
  <h1>Nhập mật khẩu để mở</h1>
  <input type="password" id="pwInput" placeholder="••••••••" autocomplete="off">
  <button id="unlockBtn">Mở khóa</button>
  <div id="lockError"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="eyebrow">Thuemail.net · ID 29</div>
  <div class="title">Mail Live TikTok / YouTube</div>
  <div class="subtitle">Gói 2 giờ · mua xong copy luôn email</div>

  <div class="card">
    <div class="row">
      <span class="label">Số dư còn lại</span>
      <span class="value balance" id="balanceVal">—</span>
    </div>
    <div class="row" style="margin-bottom:0;">
      <span class="label">Đơn giá</span>
      <span class="value">59 đ / mail</span>
    </div>
  </div>

  <div class="card">
    <div class="qty-block">
      <span class="qty-label">Số lượng mail</span>
      <div class="qty-control">
        <button id="qtyMinus" type="button">−</button>
        <input type="number" id="qtyInput" value="1" min="1" max="20">
        <button id="qtyPlus" type="button">+</button>
      </div>
    </div>
    <button id="buyBtn">Mua ngay</button>
    <div id="statusMsg"></div>
  </div>

  <div class="card" id="resultCard">
    <div class="order-code" id="orderCode"></div>
    <div id="keyList"></div>
    <button class="copy-all" id="copyAllBtn" type="button">Copy tất cả</button>
  </div>

  <div class="footer-note">
    Tool dùng nội bộ. Đóng tab để khóa lại — lần sau mở cần nhập lại mật khẩu.
  </div>
</div>

<script>
  /* ====== CẤU HÌNH — chỉnh 2 dòng dưới đây ====== */
  const APP_PASSWORD = "22222222";          // mật khẩu mở web, tự đổi
  const API_KEY       = "0642426c639f204ea35fb0b6d9da2426"; // api_key của bạn
  const PRODUCT_ID     = 29;                      // ID 29 - MAIL LIVE TIKTOK YOUTUBE, live 2h
  /* ================================================ */

  const BUY_URL   = "https://thuemail.net/api_buy.php";
  const STOCK_URL = "https://thuemail.net/api_check_stock.php";

  // ---- Lock screen ----
  const lockScreen = document.getElementById('lockScreen');
  const app = document.getElementById('app');
  const pwInput = document.getElementById('pwInput');
  const unlockBtn = document.getElementById('unlockBtn');
  const lockError = document.getElementById('lockError');

  function tryUnlock(){
    if(pwInput.value === APP_PASSWORD){
      lockScreen.style.display = 'none';
      app.style.display = 'block';
      sessionStorage.setItem('unlocked', '1');
      refreshStock();
    } else {
      lockError.textContent = 'Sai mật khẩu, thử lại.';
      pwInput.value = '';
      pwInput.focus();
    }
  }
  unlockBtn.addEventListener('click', tryUnlock);
  pwInput.addEventListener('keypress', e => { if(e.key === 'Enter') tryUnlock(); });

  if(sessionStorage.getItem('unlocked') === '1'){
    lockScreen.style.display = 'none';
    app.style.display = 'block';
    refreshStock();
  }

  // ---- Qty controls ----
  const qtyInput = document.getElementById('qtyInput');
  document.getElementById('qtyMinus').addEventListener('click', () => {
    qtyInput.value = Math.max(1, parseInt(qtyInput.value || 1) - 1);
  });
  document.getElementById('qtyPlus').addEventListener('click', () => {
    qtyInput.value = Math.min(20, parseInt(qtyInput.value || 1) + 1);
  });

  // ---- Stock / balance check ----
  async function refreshStock(){
    try{
      const fd = new FormData();
      fd.append('api_key', API_KEY);
      const res = await fetch(STOCK_URL, { method: 'POST', body: fd });
      const data = await res.json();
      const balanceField = data.balance ?? data.balance_left ?? data.so_du ?? null;
      if(balanceField !== null){
        document.getElementById('balanceVal').textContent =
          new Intl.NumberFormat('vi-VN').format(balanceField) + ' đ';
      }
    } catch(e){
      // im lặng nếu lỗi check tồn kho, không chặn mua hàng
    }
  }

  // ---- Buy flow ----
  const buyBtn = document.getElementById('buyBtn');
  const statusMsg = document.getElementById('statusMsg');
  const resultCard = document.getElementById('resultCard');
  const keyList = document.getElementById('keyList');
  const orderCodeEl = document.getElementById('orderCode');
  const copyAllBtn = document.getElementById('copyAllBtn');

  let lastKeys = [];

  buyBtn.addEventListener('click', async () => {
    const qty = Math.max(1, parseInt(qtyInput.value || 1));
    statusMsg.className = '';
    statusMsg.textContent = '';
    buyBtn.disabled = true;
    buyBtn.innerHTML = '<span class="spinner"></span>Đang mua...';

    try{
      const fd = new FormData();
      fd.append('api_key', API_KEY);
      fd.append('product_id', PRODUCT_ID);
      fd.append('qty', qty);

      const res = await fetch(BUY_URL, { method: 'POST', body: fd });
      const data = await res.json();

      if(data.status === 'success'){
        lastKeys = data.keys || [];
        renderResult(data);
        statusMsg.className = 'ok';
        statusMsg.textContent = `Mua thành công ${lastKeys.length} mail.`;
        refreshStock();

        // tự copy nếu chỉ mua 1 mail
        if(lastKeys.length === 1){
          copyText(lastKeys[0]);
          statusMsg.textContent += ' Đã copy vào clipboard.';
        }
      } else {
        statusMsg.className = 'err';
        statusMsg.textContent = data.message || 'Mua hàng thất bại.';
      }
    } catch(e){
      statusMsg.className = 'err';
      statusMsg.textContent = 'Lỗi kết nối, thử lại.';
    } finally {
      buyBtn.disabled = false;
      buyBtn.textContent = 'Mua ngay';
    }
  });

  function renderResult(data){
    resultCard.style.display = 'block';
    orderCodeEl.textContent = data.order_code ? `Mã đơn: ${data.order_code}` : '';
    keyList.innerHTML = '';
    (data.keys || []).forEach((k, i) => {
      const item = document.createElement('div');
      item.className = 'key-item';
      item.innerHTML = `
        <span class="key-text">${escapeHtml(k)}</span>
        <button type="button" data-idx="${i}">Copy</button>
      `;
      keyList.appendChild(item);
    });
    keyList.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-idx'));
        copyText(lastKeys[idx]);
        btn.textContent = 'Đã copy';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
      });
    });
  }

  copyAllBtn.addEventListener('click', () => {
    copyText(lastKeys.join('\n'));
    copyAllBtn.textContent = 'Đã copy tất cả';
    copyAllBtn.classList.add('copied');
    setTimeout(() => { copyAllBtn.textContent = 'Copy tất cả'; copyAllBtn.classList.remove('copied'); }, 1500);
  });

  function copyText(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand('copy'); } catch(e){}
    document.body.removeChild(ta);
  }
  function escapeHtml(str){
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
</script>
</body>
</html>
